site_name: "sfsdf"
site_description: "sdf"
site_url: "https://sdf.github.io/sfsdf"
repo_url: "https://github.com/sdf/sfsdf"
repo_name: "sdf/sfsdf"
site_dir: "site"
watch: [mkdocs.yaml, README.md, CHANGELOG.md, src/sf]
copyright: Copyright &copy;   sdf
edit_uri: edit/main/docs/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

nav:
- Home:
  - Overview: index.md
  - MCP: mcp_server.md
  - Changelog: changelog.md
  - License: license.md
  - Work: work.md
  - update.mde: update.md
- API Reference:
  - reference/SUMMARY.md
- Development:
  - Contributing: contributing.md
  - Code of Conduct: code_of_conduct.md

theme:
  name: material
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-night
      name: Switch to system preference

extra_css:
- css/material.css
- css/mkdocstrings.css

markdown_extensions:
- attr_list
- admonition
- callouts
- footnotes
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.magiclink
- pymdownx.snippets:
    base_path: [!relative $config_dir]
    check_paths: true
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
    slugify: !!python/object/apply:pymdownx.slugs.slugify
      kwds:
        case: lower
- pymdownx.tasklist:
    custom_checkbox: true
- toc:
    permalink: "¤"

plugins:
- search
- gen-files:
    scripts:
    - docs/gen_ref_pages.py
- literate-nav:
    nav_file: SUMMARY.md
- macros:
      module_name: mkdocs-macro
- include-markdown
- with-pdf:
      output_path: pdf/document.pdf
      enabled_if_env: ENABLE_PDF_EXPORT
- markdown-exec
- mkdocstrings:
    handlers:
      python:
        paths: [src]
        options:
          docstring_style: google
          show_source: true
          show_root_heading: true
- git-committers:
    enabled: !ENV [DEPLOY, false]
    repository: sdf/sfsdf
- minify:
    minify_html: !ENV [DEPLOY, false]
- group:
    enabled: !ENV [MATERIAL_INSIDERS, false]
    plugins:
    - typeset

extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/sdf
  - icon: fontawesome/brands/gitter
    link: https://gitter.im/sfsdf/community
  - icon: fontawesome/brands/python
    link: https://pypi.org/project/sf/
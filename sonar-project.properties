# ==============================================================================
# Project Identification
# ==============================================================================
sonar.projectKey=<< Set Your Sonar Project Key >>
sonar.organization=<< Set Your Sonar organization >>
sonar.projectName=sfsdf
sonar.projectVersion=0.1.0

# ==============================================================================
# Source & Test Configuration
# ==============================================================================
sonar.sources=src
sonar.tests=tests
sonar.language=py
sonar.python.version=3.12

# Exclude non-production code from main analysis
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/migrations/**,\
  **/conftest.py,\
  docs/**,\
  scripts/**

# Exclude test files from duplication and coverage checks
sonar.cpd.exclusions=tests/**
sonar.coverage.exclusions=\
  tests/**,\
  **/conftest.py,\
  **/__init__.py

# ==============================================================================
# Coverage
# ==============================================================================
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=report.xml

# ==============================================================================
# Security Hotspots & Vulnerability Detection
# ==============================================================================
# Enable taint analysis (tracks user input through the codebase)
sonar.python.enableTaintAnalysis=true

# Paths to check for hardcoded secrets
sonar.text.inclusions=\
  **/*.py,\
  **/*.yml,\
  **/*.yaml,\
  **/*.env,\
  **/*.cfg,\
  **/*.ini,\
  **/*.toml

# Exclude secret scanning in test fixtures
sonar.text.exclusions=\
  tests/**,\
  **/*.lock

# ==============================================================================
# Code Quality Gates
# ==============================================================================
# Fail pipeline if quality gate fails (default: true)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# ==============================================================================
# Duplication
# ==============================================================================
sonar.cpd.python.minimumTokens=50
sonar.cpd.python.minimumLines=5

# ==============================================================================
# SCM & Branch Analysis
# ==============================================================================
sonar.scm.provider=git
sonar.scm.forceReloadAll=false